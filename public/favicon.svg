<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff2d95"/>
      <stop offset="100%" style="stop-color:#bf5af2"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#0a84ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="15" fill="url(#bg)"/>
  
  <!-- Border glow -->
  <rect x="3" y="3" width="94" height="94" rx="12" fill="none" stroke="url(#cyan)" stroke-width="2" opacity="0.5"/>
  
  <!-- P letter (stylized) -->
  <g transform="translate(15, 20)">
    <!-- P stem -->
    <rect x="0" y="0" width="12" height="60" fill="url(#pink)" rx="2"/>
    <!-- P bowl -->
    <rect x="12" y="0" width="25" height="12" fill="url(#pink)" rx="2"/>
    <rect x="12" y="20" width="25" height="12" fill="url(#pink)" rx="2"/>
    <rect x="30" y="5" width="12" height="25" fill="url(#pink)" rx="2"/>
  </g>
  
  <!-- S letter (stylized) -->
  <g transform="translate(52, 20)">
    <!-- S top -->
    <rect x="5" y="0" width="30" height="10" fill="url(#cyan)" rx="2"/>
    <!-- S middle -->
    <rect x="0" y="8" width="10" height="18" fill="url(#cyan)" rx="2"/>
    <!-- S center bar -->
    <rect x="5" y="25" width="30" height="10" fill="url(#cyan)" rx="2"/>
    <!-- S bottom right -->
    <rect x="28" y="32" width="10" height="18" fill="url(#cyan)" rx="2"/>
    <!-- S bottom -->
    <rect x="3" y="50" width="30" height="10" fill="url(#cyan)" rx="2"/>
  </g>
  
  <!-- Decorative pixels -->
  <rect x="10" y="85" width="6" height="6" fill="#ffd93d"/>
  <rect x="20" y="85" width="6" height="6" fill="#30d158"/>
  <rect x="30" y="85" width="6" height="6" fill="#ff2d95"/>
  <rect x="64" y="85" width="6" height="6" fill="#00f5ff"/>
  <rect x="74" y="85" width="6" height="6" fill="#bf5af2"/>
  <rect x="84" y="85" width="6" height="6" fill="#ff9f0a"/>
</svg>
