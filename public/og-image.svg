<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf5af2"/>
      <stop offset="50%" style="stop-color:#ff2d95"/>
      <stop offset="100%" style="stop-color:#00f5ff"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#00f5ff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#00f5ff" stroke-width="1"/>
  </g>
  
  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="url(#accent)" stroke-width="4"/>
  
  <!-- Game controller emoji area -->
  <text x="600" y="180" text-anchor="middle" font-size="80">🎮</text>
  
  <!-- Title -->
  <text x="600" y="280" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="48" fill="#ffd93d">
    PUB/SUB AND CHILL
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="350" text-anchor="middle" font-family="'VT323', monospace" font-size="36" fill="#00f5ff">
    Solace Trivia Arcade
  </text>
  
  <!-- Description -->
  <text x="600" y="430" text-anchor="middle" font-family="'VT323', monospace" font-size="28" fill="#ffffff" opacity="0.8">
    10 Levels • 250+ Questions • Test Your Knowledge!
  </text>
  
  <!-- Call to action -->
  <rect x="400" y="480" width="400" height="60" fill="#ff2d95" rx="4"/>
  <text x="600" y="520" text-anchor="middle" font-family="'Press Start 2P', monospace" font-size="18" fill="#ffffff">
    PLAY NOW
  </text>
  
  <!-- Decorative pixels -->
  <rect x="50" y="50" width="20" height="20" fill="#bf5af2"/>
  <rect x="80" y="50" width="20" height="20" fill="#ff2d95"/>
  <rect x="110" y="50" width="20" height="20" fill="#00f5ff"/>
  
  <rect x="1070" y="560" width="20" height="20" fill="#00f5ff"/>
  <rect x="1100" y="560" width="20" height="20" fill="#ff2d95"/>
  <rect x="1130" y="560" width="20" height="20" fill="#bf5af2"/>
</svg>
